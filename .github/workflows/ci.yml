name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pet
          POSTGRES_PASSWORD: pet
          POSTGRES_DB: pet_aggregator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'web/package-lock.json' }
      - run: cd web && npm ci
      - run: cd web && npm run typecheck
      - run: cd web && npm run lint
      - run: cd web && npm test
        env:
          DATABASE_URL: postgresql://pet:pet@localhost:5432/pet_aggregator_test
          PAYLOAD_SECRET: ci-test-secret-32-characters-aaaa
      - run: cd web && npx playwright install --with-deps chromium
      - run: cd web && npm run test:e2e
        env:
          DATABASE_URL: postgresql://pet:pet@localhost:5432/pet_aggregator_test
          PAYLOAD_SECRET: ci-test-secret-32-characters-aaaa
