<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg);} .row{display:flex;gap:14px;align-items:flex-end} .box{background:#fff;border:1px solid var(--border)} .label{font-family:var(--font-ui);font-size:11px;color:var(--fg-muted);margin-top:6px;text-align:center}</style>
</head><body>
<div class="row">
  <div><div class="box" style="width:70px;height:50px;border-radius:6px"></div><div class="label">xs · 6</div></div>
  <div><div class="box" style="width:70px;height:50px;border-radius:10px"></div><div class="label">sm · 10</div></div>
  <div><div class="box" style="width:70px;height:50px;border-radius:14px"></div><div class="label">md · 14</div></div>
  <div><div class="box" style="width:70px;height:50px;border-radius:20px"></div><div class="label">lg · 20</div></div>
  <div><div class="box" style="width:70px;height:50px;border-radius:24px"></div><div class="label">xl · 24</div></div>
  <div><div class="box" style="width:70px;height:50px;border-radius:32px"></div><div class="label">2xl · 32</div></div>
  <div><div class="box" style="width:70px;height:50px;border-radius:999px"></div><div class="label">pill</div></div>
</div>
</body></html>
