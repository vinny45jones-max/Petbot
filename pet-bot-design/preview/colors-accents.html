<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--bg);} .row{display:flex;gap:10px;flex-wrap:wrap} .sw{width:130px;height:80px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-ui);font-size:12px;font-weight:700;color:#1F3B2D} .hex{opacity:.8;font-weight:500;font-size:11px}</style>
</head><body>
<div class="row">
  <div class="sw" style="background:#F3C78B"><div>accent-cream</div><div class="hex">#F3C78B</div></div>
  <div class="sw" style="background:#F4C9B6"><div>accent-blush</div><div class="hex">#F4C9B6</div></div>
  <div class="sw" style="background:#A8B79A"><div>accent-moss</div><div class="hex">#A8B79A</div></div>
  <div class="sw" style="background:#DCEBE0"><div>success-soft</div><div class="hex">#DCEBE0</div></div>
  <div class="sw" style="background:#3F8F6A;color:#fff"><div>success</div><div class="hex">#DCEBE0</div></div>
</div>
</body></html>
