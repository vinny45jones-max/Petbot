<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--bg);} .row{display:flex;gap:10px;flex-wrap:wrap} .sw{width:130px;height:80px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-ui);font-size:12px;font-weight:700;color:#fff} .sw.dark{color:#1F3B2D} .hex{opacity:.9;font-weight:500;font-size:11px}</style>
</head><body>
<div class="row">
  <div class="sw" style="background:#E2734A"><div>brand</div><div class="hex">#E2734A</div></div>
  <div class="sw" style="background:#C85F3B"><div>brand-hover</div><div class="hex">#C85F3B</div></div>
  <div class="sw dark" style="background:#FCE7DC"><div>brand-soft</div><div class="hex">#FCE7DC</div></div>
  <div class="sw" style="background:#1F3B2D"><div>ink</div><div class="hex">#1F3B2D</div></div>
  <div class="sw" style="background:#2E4A3C"><div>ink-soft</div><div class="hex">#2E4A3C</div></div>
</div>
</body></html>
