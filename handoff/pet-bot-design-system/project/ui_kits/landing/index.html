<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pet Help — каждой лапе свой дом</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="landing.css">
<script src="../../assets/icons/lucide.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Landing">
<div id="app"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Pets.jsx"></script>
<script type="text/babel" src="Stories.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="Help.jsx"></script>
<script type="text/babel" src="Volunteer.jsx"></script>
<script type="text/babel" src="Contacts.jsx"></script>
<script type="text/babel" src="AdoptModal.jsx"></script>
<script type="text/babel" src="Toast.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
  const [adopting, setAdopting] = React.useState(null);
  const [toasts, setToasts] = React.useState([]);
  const pushToast = React.useCallback((text) => {
    const id = Math.random().toString(36).slice(2);
    setToasts((t) => [...t, { id, text }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 4200);
  }, []);
  const closeToast = (id) => setToasts((t) => t.filter((x) => x.id !== id));
  return (
    <React.Fragment>
      <Header />
      <main>
        <Hero />
        <About />
        <Pets onAdopt={setAdopting} />
        <Stories />
        <FAQ />
        <Help onToast={pushToast} />
        <Volunteer onToast={pushToast} />
        <Contacts onToast={pushToast} />
      </main>
      <Footer />
      <AdoptModal pet={adopting} onClose={() => setAdopting(null)} onToast={pushToast} />
      <MobileBar />
      <ToastHost toasts={toasts} onClose={closeToast} />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
