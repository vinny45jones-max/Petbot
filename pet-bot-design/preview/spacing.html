<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg);}
.row{display:flex;gap:20px;align-items:center;font-family:var(--font-ui);font-size:13px;color:var(--fg-muted)}
.bar{width:32px;background:var(--brand-soft);border-radius:6px}</style>
</head><body>
<div class="row">
  <div style="text-align:center"><div class="bar" style="height:4px"></div><div>4 · 1</div></div>
  <div style="text-align:center"><div class="bar" style="height:8px"></div><div>8 · 2</div></div>
  <div style="text-align:center"><div class="bar" style="height:12px"></div><div>12 · 3</div></div>
  <div style="text-align:center"><div class="bar" style="height:16px"></div><div>16 · 4</div></div>
  <div style="text-align:center"><div class="bar" style="height:24px"></div><div>24 · 5</div></div>
  <div style="text-align:center"><div class="bar" style="height:32px"></div><div>32 · 6</div></div>
  <div style="text-align:center"><div class="bar" style="height:48px"></div><div>48 · 7</div></div>
  <div style="text-align:center"><div class="bar" style="height:64px"></div><div>64 · 8</div></div>
</div>
</body></html>
