<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--bg);} .row{display:flex;gap:10px;flex-wrap:wrap} .sw{width:130px;height:80px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-ui);font-size:12px;font-weight:600;border:1px solid var(--border)} .sw .hex{opacity:.8;font-weight:400;font-size:11px}</style>
</head><body>
<div class="row">
  <div class="sw" style="background:#F7F1E6;color:#1F3B2D"><div>bg</div><div class="hex">#F7F1E6</div></div>
  <div class="sw" style="background:#EDE4D3;color:#1F3B2D"><div>bg-alt</div><div class="hex">#EDE4D3</div></div>
  <div class="sw" style="background:#FFFFFF;color:#1F3B2D"><div>surface</div><div class="hex">#FFFFFF</div></div>
  <div class="sw" style="background:#FAF5EC;color:#1F3B2D"><div>surface-sunk</div><div class="hex">#FAF5EC</div></div>
</div>
</body></html>
